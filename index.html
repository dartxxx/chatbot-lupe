<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupe — Asistente Municipal de El Colorado</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #1a2744 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        header {
            background: linear-gradient(135deg, #006994, #00b4d8);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left { display: flex; align-items: center; gap: 12px; }

        .header-logo {
            width: 42px; height: 42px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            border: 2px solid rgba(255,255,255,0.3);
        }

        .header-info h1 {
            color: white;
            font-size: 17px;
            font-weight: 600;
        }

        .header-info .subtitle {
            color: rgba(255,255,255,0.75);
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 2px;
        }

        .header-badge {
            background: rgba(255,255,255,0.15);
            padding: 5px 12px;
            border-radius: 20px;
            color: white;
            font-size: 11px;
            display: flex; align-items: center; gap: 5px;
        }

        /* CHAT AREA */
        main {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 75%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.bot { align-self: flex-start; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }

        .msg-avatar {
            width: 34px; height: 34px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 15px;
            flex-shrink: 0;
        }

        .message.bot .msg-avatar {
            background: linear-gradient(135deg, #006994, #00b4d8);
            color: white;
        }

        .message.user .msg-avatar {
            background: linear-gradient(135deg, #e2e8f0, #94a3b8);
            color: #1e293b;
        }

        .msg-bubble {
            padding: 11px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.55;
            position: relative;
        }

        .message.bot .msg-bubble {
            background: #1e2d4a;
            color: #e2e8f0;
            border-bottom-left-radius: 4px;
        }

        .message.user .msg-bubble {
            background: linear-gradient(135deg, #0077b6, #00b4d8);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .msg-time {
            font-size: 10px;
            color: rgba(255,255,255,0.35);
            margin-top: 5px;
            text-align: right;
        }

        .message.user .msg-time { color: rgba(255,255,255,0.5); }

        /* TYPING */
        .typing {
            display: none;
            align-self: flex-start;
            gap: 10px;
        }

        .typing.visible { display: flex; }

        .typing .msg-bubble {
            background: #1e2d4a;
            padding: 14px 20px;
        }

        .dots {
            display: flex; gap: 5px; align-items: center;
        }

        .dots span {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #64748b;
            animation: bounce 1.4s infinite;
        }

        .dots span:nth-child(2) { animation-delay: 0.15s; }
        .dots span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-7px); }
        }

        /* INPUT */
        .input-area {
            padding: 16px 24px 20px;
            background: rgba(10, 22, 40, 0.95);
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        .input-row {
            display: flex;
            gap: 10px;
            max-width: 900px;
            margin: 0 auto;
        }

        #input {
            flex: 1;
            padding: 13px 18px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px;
            background: #1e2d4a;
            color: white;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
        }

        #input:focus { border-color: #00b4d8; }
        #input::placeholder { color: #64748b; }

        #send {
            width: 48px; height: 48px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #0077b6, #00b4d8);
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        #send:hover { transform: scale(1.06); box-shadow: 0 4px 20px rgba(0,180,216,0.35); }
        #send:active { transform: scale(0.95); }

        /* WELCOME */
        .welcome {
            text-align: center;
            padding: 40px 20px;
            color: #64748b;
        }

        .welcome h3 { color: #94a3b8; font-size: 18px; margin-bottom: 8px; }
        .welcome p { font-size: 13px; line-height: 1.6; }

        /* SCROLLBAR */
        #chat::-webkit-scrollbar { width: 4px; }
        #chat::-webkit-scrollbar-track { background: transparent; }
        #chat::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }

        /* ERROR */
        .error-banner {
            background: #dc2626;
            color: white;
            text-align: center;
            padding: 8px;
            font-size: 12px;
            display: none;
        }

        .error-banner.visible { display: block; }

        /* MODE BADGE */
        .mode-badge {
            position: fixed;
            bottom: 90px;
            right: 24px;
            background: rgba(0,180,216,0.2);
            border: 1px solid rgba(0,180,216,0.3);
            color: #00b4d8;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 10px;
            display: none;
        }

        .mode-badge.visible { display: block; }

        @media (max-width: 600px) {
            .message { max-width: 88%; }
            header { padding: 12px 16px; }
            #chat { padding: 16px; }
            .input-area { padding: 12px 16px 16px; }
            .header-badge { display: none; }
        }
    </style>
</head>
<body>

<div class="error-banner" id="errorBanner"></div>

<header>
    <div class="header-left">
        <div class="header-logo">🤖</div>
        <div class="header-info">
            <h1>Lupe — Asistente Municipal</h1>
            <div class="subtitle">
                <span style="width:6px;height:6px;border-radius:50%;background:#4ade80;display:inline-block;animation:pulse 2s infinite"></span>
                En línea · El Colorado, Formosa
            </div>
        </div>
    </div>
    <div class="header-badge">🏛️ El Colorado</div>
</header>

<main>
    <div id="chat">
        <div class="welcome">
            <h3>👋 ¡Bienvenido!</h3>
            <p>Soy Lupe, la asistente virtual de la<br>Municipalidad de El Colorado, Formosa.</p>
        </div>
    </div>

    <div class="typing" id="typing">
        <div class="msg-avatar" style="background:linear-gradient(135deg,#006994,#00b4d8);color:white">🤖</div>
        <div class="msg-bubble">
            <div class="dots"><span></span><span></span><span></span></div>
        </div>
    </div>
</main>

<div class="input-area">
    <div class="input-row">
        <input type="text" id="input" placeholder="Escribí tu consulta..." autocomplete="off" />
        <button id="send" onclick="send()">➤</button>
    </div>
</div>

<div class="mode-badge" id="modeBadge">MODO DEMO</div>

<script>
    // ─────────────────────────────────────────────
    // CONFIGURACIÓN — Cambiar según tu deploy
    // ─────────────────────────────────────────────
    //
    // PARA VERCEL: Dejar vacío o poner la URL de tu vercel app
    // El archivo api/chat.js es la función serverless
    const API_URL = '/api/chat';  // Si está en el mismo dominio, solo /api/chat
    // const API_URL = 'https://tu-app.vercel.app/api/chat';
    //
    // ─────────────────────────────────────────────

    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const typing = document.getElementById('typing');
    const errorBanner = document.getElementById('errorBanner');
    const modeBadge = document.getElementById('modeBadge');

    let sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2,9);

    function getTime() {
        return new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
    }

    function addMessage(text, sender) {
        const welcome = chat.querySelector('.welcome');
        if (welcome) welcome.remove();

        const div = document.createElement('div');
        div.className = `message ${sender}`;
        div.innerHTML = `
            <div class="msg-avatar">${sender === 'bot' ? '🤖' : '👤'}</div>
            <div>
                <div class="msg-bubble">${text.replace(/\n/g, '<br>')}</div>
                <div class="msg-time">${getTime()}</div>
            </div>
        `;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function showError(msg) {
        errorBanner.textContent = '⚠️ ' + msg;
        errorBanner.classList.add('visible');
        setTimeout(() => errorBanner.classList.remove('visible'), 4000);
    }

    function showTyping() { typing.classList.add('visible'); chat.appendChild(typing); chat.scrollTop = chat.scrollHeight; }
    function hideTyping() { typing.classList.remove('visible'); }

    async function send() {
        const text = input.value.trim();
        if (!text) return;

        input.value = '';
        addMessage(text, 'user');
        showTyping();

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mensaje: text, sessionId: sessionId })
            });

            if (!res.ok) throw new Error('Error ' + res.status);

            const data = await res.json();
            hideTyping();

            if (data.respuesta) {
                addMessage(data.respuesta, 'bot');
                if (data.modo === 'demo' || data.modo === 'fallback') {
                    modeBadge.classList.add('visible');
                    setTimeout(() => modeBadge.classList.remove('visible'), 5000);
                }
            } else {
                throw new Error('Respuesta vacía');
            }
        } catch (e) {
            hideTyping();
            showError('No se pudo conectar con Lupe. Verificá tu conexión.');
            console.error(e);
        }
    }

    input.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });

    // Mensaje inicial
    setTimeout(() => {
        addMessage('¡Hola! Soy <strong>Lupe</strong>, tu asistente virtual en la Municipalidd de El Colorado. 🏛️<br><br>Puedo ayudarte con:<br>• Trámites y requisitos<br>• Horarios de atención<br>• Cómo hacer reclamos<br>• Información sobre servicios<br><br>¿En qué puedo ayudarte hoy?', 'bot');
    }, 800);
</script>

</body>
</html>

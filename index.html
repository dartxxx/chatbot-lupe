<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Municipalidad de El Colorado — Asistencia Virtual</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --bg-primary: #0a0f1a;
      --bg-secondary: #111827;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --accent-light: #3b82f6;
      --accent-glow: rgba(37, 99, 235, 0.15);
      --text-primary: #f9fafb;
      --text-secondary: #9ca3af;
      --text-muted: #6b7280;
      --bot-bubble: #1f2937;
      --user-bubble: #2563eb;
      --border: rgba(255,255,255,0.06);
      --radius: 12px;
      --radius-lupe: 12px 12px 12px 4px;
      --radius-user: 12px 12px 4px 12px;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg-primary: #f8fafc;
        --bg-secondary: #f3f4f6;
        --text-primary: #111827;
        --text-secondary: #4b5563;
        --text-muted: #9ca3af;
        --bot-bubble: #e5e7eb;
        --border: rgba(0,0,0,0.06);
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: var(--text-primary);
    }

    /* Header */
    header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .escudo {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), #1e40af);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .escudo svg { width: 22px; height: 22px; color: white; }

    .header-info h1 {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .header-info p {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.2);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      color: #4ade80;
    }

    .status-dot {
      width: 6px; height: 6px;
      background: #4ade80;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .menu-btn {
      width: 34px; height: 34px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .menu-btn:hover { background: var(--bot-bubble); color: var(--text-primary); }
    .menu-btn svg { width: 16px; height: 16px; }

    /* Chat area */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: 680px;
      width: 100%;
      margin: 0 auto;
    }

    /* Messages */
    .msg-row {
      display: flex;
      gap: 10px;
      max-width: 75%;
      animation: msgIn 0.3s ease;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg-row.bot { align-self: flex-start; }
    .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }

    .msg-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .msg-row.bot .msg-avatar {
      background: linear-gradient(135deg, var(--accent), #1e40af);
    }

    .msg-row.user .msg-avatar {
      background: var(--bg-secondary);
    }

    .msg-avatar svg { width: 14px; height: 14px; color: white; }

    .msg-row.user .msg-avatar svg { color: var(--text-secondary); }

    .msg-bubble {
      padding: 11px 15px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.6;
    }

    .msg-row.bot .msg-bubble {
      background: var(--bot-bubble);
      color: var(--text-primary);
      border-radius: var(--radius-lupe);
    }

    .msg-row.user .msg-bubble {
      background: var(--user-bubble);
      color: white;
      border-radius: var(--radius-user);
    }

    .msg-time {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 3px;
      padding: 0 4px;
    }

    .msg-row.user .msg-time { text-align: right; }

    /* Welcome screen */
    .welcome {
      text-align: center;
      padding: 40px 20px 20px;
      animation: fadeUp 0.5s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .welcome-avatar {
      width: 60px; height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #1e40af);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }

    .welcome-avatar svg { width: 30px; height: 30px; color: white; }

    .welcome h2 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .welcome p {
      font-size: 13px;
      color: var(--text-muted);
      max-width: 320px;
      margin: 0 auto;
      line-height: 1.5;
    }

    /* Quick actions */
    .quick-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      max-width: 680px;
      width: 100%;
      margin: 0 auto;
      padding: 0 20px 12px;
    }

    .quick-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 7px 13px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .quick-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .quick-btn svg { width: 13px; height: 13px; }

    /* Typing indicator */
    .typing-row {
      display: none;
      gap: 10px;
      max-width: 75%;
      align-self: flex-start;
    }

    .typing-row.visible { display: flex; }

    .typing-row .msg-avatar {
      background: linear-gradient(135deg, var(--accent), #1e40af);
    }

    .typing-bubble {
      background: var(--bot-bubble);
      border-radius: var(--radius-lupe);
      padding: 12px 18px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .typing-bubble span {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: typingBounce 1.3s infinite;
    }

    .typing-bubble span:nth-child(2) { animation-delay: 0.15s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    /* Input area */
    .input-area {
      padding: 14px 20px 18px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: center;
      max-width: 680px;
      margin: 0 auto;
    }

    #input {
      flex: 1;
      padding: 11px 16px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    #input:focus { border-color: var(--accent); }
    #input::placeholder { color: var(--text-muted); }

    #send {
      width: 42px; height: 42px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    #send:hover { background: var(--accent-hover); }
    #send svg { width: 17px; height: 17px; }

    /* Footer */
    .footer {
      text-align: center;
      padding: 6px;
      font-size: 10px;
      color: var(--text-muted);
      background: var(--bg-primary);
    }

    /* Error toast */
    .error-toast {
      position: fixed;
      bottom: 84px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #dc2626;
      color: white;
      padding: 9px 18px;
      border-radius: 10px;
      font-size: 12px;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 200;
    }

    .error-toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Mode badge */
    .mode-badge {
      position: fixed;
      bottom: 90px;
      right: 16px;
      background: rgba(37,99,235,0.12);
      border: 1px solid rgba(37,99,235,0.25);
      color: var(--accent-light);
      padding: 3px 9px;
      border-radius: 10px;
      font-size: 10px;
      display: none;
    }

    .mode-badge.visible { display: block; }

    /* Scrollbar */
    #chat::-webkit-scrollbar { width: 2px; }
    #chat::-webkit-scrollbar-thumb { background: #374151; border-radius: 2px; }

    /* Responsive */
    @media (max-width: 600px) {
      .msg-row { max-width: 88%; }
      header { padding: 11px 16px; }
      .status-badge span { display: none; }
      #chat { padding: 16px 12px; }
      .input-area { padding: 12px 16px 14px; }
      .quick-row { padding: 0 16px 10px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <div class="escudo">
        <i data-lucide="landmark"></i>
      </div>
      <div class="header-info">
        <h1>Municipalidad de El Colorado</h1>
        <p>Asistente Virtual · Lupe</p>
      </div>
    </div>
    <div class="header-right">
      <div class="status-badge">
        <div class="status-dot"></div>
        <span>En línea</span>
      </div>
      <button class="menu-btn">
        <i data-lucide="more-vertical"></i>
      </button>
    </div>
  </header>

  <div class="quick-row" id="quickRow">
    <button class="quick-btn" onclick="sendQuick('¿Qué trámites puedo realizar?')">
      <i data-lucide="file-text"></i> Trámites
    </button>
    <button class="quick-btn" onclick="sendQuick('¿Cuál es el horario de atención?')">
      <i data-lucide="clock"></i> Horarios
    </button>
    <button class="quick-btn" onclick="sendQuick('Necesito hacer un reclamo')">
      <i data-lucide="message-square"></i> Reclamo
    </button>
    <button class="quick-btn" onclick="sendQuick('¿Dónde está la municipalidad?')">
      <i data-lucide="map-pin"></i> Ubicación
    </button>
  </div>

  <div id="chat">
    <div class="welcome">
      <div class="welcome-avatar">
        <i data-lucide="bot"></i>
      </div>
      <h2>Asistente Virtual</h2>
      <p>Soy <strong>Lupe</strong>. Puedo ayudarte con trámites municipales, horarios de atención, servicios y más.</p>
    </div>
  </div>

  <div class="typing-row" id="typingRow">
    <div class="msg-avatar">
      <i data-lucide="bot"></i>
    </div>
    <div class="typing-bubble"><span></span><span></span><span></span></div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <input type="text" id="input" placeholder="Escribí tu consulta…" autocomplete="off" />
      <button id="send" onclick="send()">
        <i data-lucide="send"></i>
      </button>
    </div>
  </div>

  <div class="footer">Municipalidad de El Colorado · Partido Laishi, Formosa</div>
  <div class="mode-badge" id="modeBadge">MODO BASE</div>
  <div class="error-toast" id="errorToast"></div>

  <script>
    lucide.createIcons();

    const API_URL = '/api/chat';
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const typingRow = document.getElementById('typingRow');
    const modeBadge = document.getElementById('modeBadge');
    const errorToast = document.getElementById('errorToast');

    let sessionId = 's_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);

    function t() {
      return new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
    }

    function addMsg(text, who) {
      const wel = chat.querySelector('.welcome');
      if (wel) wel.remove();

      const botIcon = '<i data-lucide="bot" style="width:14px;height:14px"></i>';
      const userIcon = '<i data-lucide="user" style="width:14px;height:14px"></i>';

      const row = document.createElement('div');
      row.className = `msg-row ${who}`;
      row.innerHTML = `
        <div class="msg-avatar">${who === 'bot' ? botIcon : userIcon}</div>
        <div>
          <div class="msg-bubble">${text.replace(/\n/g, '<br>')}</div>
          <div class="msg-time">${t()}</div>
        </div>`;
      chat.appendChild(row);
      lucide.createIcons({ nodes: [row] });
      chat.scrollTop = chat.scrollHeight;
    }

    function showErr(msg) {
      errorToast.textContent = '⚠️ ' + msg;
      errorToast.classList.add('visible');
      setTimeout(() => errorToast.classList.remove('visible'), 4000);
    }

    function showTyping() {
      typingRow.classList.add('visible');
      chat.appendChild(typingRow);
      chat.scrollTop = chat.scrollHeight;
    }

    function hideTyping() {
      typingRow.classList.remove('visible');
    }

    async function send() {
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      addMsg(text, 'user');
      showTyping();

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mensaje: text, sessionId: sessionId })
        });
        if (!res.ok) throw new Error(res.status);
        const data = await res.json();
        hideTyping();
        if (data.respuesta) {
          addMsg(data.respuesta, 'bot');
          if (data.modo === 'fallback') {
            modeBadge.classList.add('visible');
            setTimeout(() => modeBadge.classList.remove('visible'), 5000);
          }
        } else {
          throw new Error('empty');
        }
      } catch (e) {
        hideTyping();
        showErr('No pude conectarme. Intentá de nuevo.');
      }
    }

    function sendQuick(text) {
      input.value = text;
      send();
    }

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });

    setTimeout(() => {
      addMsg(
        '¡Hola! Soy <strong>Lupe</strong>, asistente virtual de la Municipalidad de El Colorado. 🏛️<br><br>' +
        'Puedo ayudarte con:<br>' +
        '• Trámites y requisitos<br>' +
        '• Horarios de atención<br>' +
        '• Ubicación y contactos<br>' +
        '• Servicios municipales<br><br>' +
        '¿En qué puedo ayudarte?',
        'bot'
      );
    }, 600);
  </script>
</body>
</html>

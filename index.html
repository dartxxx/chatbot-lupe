<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupe — Asistente Municipal de El Colorado</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f1117;
            --bg-secondary: #161823;
            --bg-card: #1c1f2e;
            --bg-input: #252836;
            --accent: #3b82f6;
            --accent-light: #60a5fa;
            --accent-glow: rgba(59, 130, 246, 0.15);
            --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --bot-bubble: #252836;
            --user-bubble: #3b82f6;
            --border: rgba(255,255,255,0.06);
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
            --radius: 16px;
            --radius-sm: 10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--text-primary);
        }

        /* ── HEADER ── */
        header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
        }

        .header-left { display: flex; align-items: center; gap: 14px; }

        .bot-avatar {
            width: 46px; height: 46px;
            border-radius: 50%;
            background: var(--accent-gradient);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
            box-shadow: 0 0 20px rgba(59,130,246,0.3);
            position: relative;
        }

        .bot-avatar::after {
            content: '';
            position: absolute;
            bottom: 0; right: 0;
            width: 12px; height: 12px;
            border-radius: 50%;
            background: #22c55e;
            border: 2px solid var(--bg-secondary);
            animation: livePulse 2s infinite;
        }

        @keyframes livePulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
            50% { box-shadow: 0 0 0 6px rgba(34,197,94,0); }
        }

        .bot-meta h1 {
            font-size: 15px; font-weight: 600; color: var(--text-primary);
        }

        .bot-meta p {
            font-size: 12px; color: #22c55e; margin-top: 2px;
            display: flex; align-items: center; gap: 4px;
        }

        .header-right { display: flex; align-items: center; gap: 10px; }

        .city-tag {
            background: rgba(59,130,246,0.1);
            border: 1px solid rgba(59,130,246,0.2);
            color: var(--accent-light);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px; font-weight: 600;
            display: flex; align-items: center; gap: 5px;
        }

        .menu-btn {
            width: 36px; height: 36px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
            transition: all 0.2s;
        }
        .menu-btn:hover { background: var(--bg-card); color: var(--text-primary); }

        /* ── MAIN CHAT ── */
        main {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-width: 760px;
            width: 100%;
            margin: 0 auto;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* ── MESSAGE ── */
        .msg-row {
            display: flex;
            gap: 10px;
            max-width: 80%;
            animation: msgIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(12px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .msg-row.bot { align-self: flex-start; }
        .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }

        .msg-icon {
            width: 30px; height: 30px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; flex-shrink: 0;
            margin-top: 2px;
        }
        .msg-row.bot .msg-icon { background: var(--accent-gradient); color: white; }
        .msg-row.user .msg-icon { background: var(--bg-input); color: var(--text-secondary); }

        .msg-content { display: flex; flex-direction: column; gap: 3px; }

        .msg-bubble {
            padding: 12px 16px;
            border-radius: var(--radius);
            font-size: 14px;
            line-height: 1.6;
            position: relative;
        }

        .msg-row.bot .msg-bubble {
            background: var(--bot-bubble);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }

        .msg-row.user .msg-bubble {
            background: var(--user-bubble);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .msg-time {
            font-size: 10px;
            color: var(--text-muted);
            padding: 0 4px;
        }

        .msg-row.user .msg-time { text-align: right; }

        /* ── DATE DIVIDER ── */
        .date-divider {
            text-align: center;
            margin: 16px 0;
            position: relative;
        }

        .date-divider span {
            background: var(--bg-primary);
            padding: 4px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-muted);
            position: relative;
            z-index: 1;
        }

        /* ── TYPING ── */
        .typing-row {
            display: none;
            gap: 10px;
            max-width: 80%;
            align-self: flex-start;
            animation: msgIn 0.3s ease;
        }

        .typing-row.visible { display: flex; }

        .typing-row .msg-icon { background: var(--accent-gradient); color: white; }

        .typing-bubble {
            background: var(--bot-bubble);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            border-radius: var(--radius);
            padding: 14px 20px;
            display: flex; gap: 5px; align-items: center;
        }

        .typing-bubble span {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: typingBounce 1.4s infinite;
        }
        .typing-bubble span:nth-child(2) { animation-delay: 0.15s; }
        .typing-bubble span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-7px); }
        }

        /* ── WELCOME ── */
        .welcome {
            text-align: center;
            padding: 48px 24px 24px;
            animation: fadeUp 0.6s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .welcome-icon {
            width: 72px; height: 72px;
            border-radius: 50%;
            background: var(--accent-gradient);
            display: flex; align-items: center; justify-content: center;
            font-size: 32px;
            margin: 0 auto 20px;
            box-shadow: 0 8px 32px rgba(59,130,246,0.25);
        }

        .welcome h2 { font-size: 20px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; }
        .welcome p { font-size: 14px; color: var(--text-muted); line-height: 1.6; max-width: 320px; margin: 0 auto; }
        .welcome p a { color: var(--accent-light); text-decoration: none; }

        /* ── INPUT AREA ── */
        .input-area {
            padding: 16px 20px 20px;
            background: var(--bg-primary);
            border-top: 1px solid var(--border);
        }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            max-width: 760px;
            margin: 0 auto;
        }

        #input {
            flex: 1;
            padding: 13px 18px;
            border: 1px solid var(--border);
            border-radius: 28px;
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
            font-family: inherit;
            line-height: 1.5;
        }

        #input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        #input::placeholder { color: var(--text-muted); }

        #send {
            width: 48px; height: 48px;
            border-radius: 50%;
            border: none;
            background: var(--accent-gradient);
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 4px 16px rgba(59,130,246,0.3);
        }

        #send:hover {
            transform: scale(1.07);
            box-shadow: 0 6px 24px rgba(59,130,246,0.45);
        }

        #send:active { transform: scale(0.94); }

        /* ── QUICK ACTIONS ── */
        .quick-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            max-width: 760px;
            margin: 0 auto 10px;
            padding: 0 20px;
        }

        .quick-btn {
            padding: 7px 14px;
            border-radius: 20px;
            border: 1px solid rgba(59,130,246,0.25);
            background: rgba(59,130,246,0.07);
            color: var(--accent-light);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .quick-btn:hover {
            background: rgba(59,130,246,0.15);
            border-color: rgba(59,130,246,0.5);
            transform: translateY(-1px);
        }

        /* ── FOOTER ── */
        .footer {
            text-align: center;
            padding: 8px;
            font-size: 10px;
            color: var(--text-muted);
        }

        /* ── SCROLLBAR ── */
        #chat::-webkit-scrollbar { width: 3px; }
        #chat::-webkit-scrollbar-track { background: transparent; }
        #chat::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }

        /* ── MODE BADGE ── */
        .mode-badge {
            position: fixed;
            bottom: 94px; right: 20px;
            background: rgba(59,130,246,0.15);
            border: 1px solid rgba(59,130,246,0.3);
            color: var(--accent-light);
            padding: 4px 10px; border-radius: 12px;
            font-size: 10px; display: none; z-index: 50;
        }
        .mode-badge.visible { display: block; }

        /* ── ERROR ── */
        .error-toast {
            position: fixed;
            bottom: 20px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #ef4444;
            color: white;
            padding: 10px 20px; border-radius: 12px;
            font-size: 13px; opacity: 0;
            transition: all 0.3s ease; z-index: 200;
        }
        .error-toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ── RESPONSIVE ── */
        @media (max-width: 600px) {
            .msg-row { max-width: 88%; }
            header { padding: 12px 16px; }
            .city-tag { display: none; }
            #chat { padding: 16px 12px; }
            .input-area { padding: 12px 16px 16px; }
            .quick-row { padding: 0 16px; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <div class="bot-avatar">🤖</div>
        <div class="bot-meta">
            <h1>Lupe — Asistente Municipal</h1>
            <p><span style="width:6px;height:6px;border-radius:50%;background:#22c55e;display:inline-block"></span> En línea · El Colorado, Formosa</p>
        </div>
    </div>
    <div class="header-right">
        <div class="city-tag">🏛️ El Colorado, Formosa</div>
        <button class="menu-btn">⋮</button>
    </div>
</header>

<main>
    <div class="quick-row" id="quickRow">
        <button class="quick-btn" onclick="sendQuick('¿Qué trámites puedo hacer?')">📋 Trámites</button>
        <button class="quick-btn" onclick="sendQuick('¿Cuál es el horario de atención?')">🕐 Horarios</button>
        <button class="quick-btn" onclick="sendQuick('Necesito hacer un reclamo')">📝 Reclamo</button>
        <button class="quick-btn" onclick="sendQuick('¿Qué документы necesito para abrir un negocio?')">🏪 Habilitación</button>
    </div>

    <div id="chat">
        <div class="welcome">
            <div class="welcome-icon">🤖</div>
            <h2>¡Bienvenido!</h2>
            <p>Soy <strong>Lupe</strong>, la asistente virtual de la<br>Municipalidad de El Colorado, Formosa.</p>
        </div>
    </div>

    <div class="typing-row" id="typingRow">
        <div class="msg-icon">🤖</div>
        <div class="typing-bubble"><span></span><span></span><span></span></div>
    </div>
</main>

<div class="input-area">
    <div class="input-row">
        <input type="text" id="input" placeholder="Escribí tu consulta..." autocomplete="off" />
        <button id="send" onclick="send()">➤</button>
    </div>
</div>

<div class="footer">Municipalidad de El Colorado · Powered by IA</div>

<div class="mode-badge" id="modeBadge">MODO DEMO</div>
<div class="error-toast" id="errorToast"></div>

<script>
    // ─────────────────────────────────────────
    // Lógica igual que antes — sin cambios
    // ─────────────────────────────────────────
    const API_URL = '/api/chat';

    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const typingRow = document.getElementById('typingRow');
    const modeBadge = document.getElementById('modeBadge');
    const errorToast = document.getElementById('errorToast');

    let sessionId = 's_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);

    function t() {
        return new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
    }

    function addMsg(text, who) {
        const wel = chat.querySelector('.welcome');
        if (wel) wel.remove();

        const row = document.createElement('div');
        row.className = `msg-row ${who}`;
        row.innerHTML = `
            <div class="msg-icon">${who === 'bot' ? '🤖' : '👤'}</div>
            <div class="msg-content">
                <div class="msg-bubble">${text.replace(/\n/g, '<br>')}</div>
                <div class="msg-time">${t()}</div>
            </div>`;
        chat.appendChild(row);
        chat.scrollTop = chat.scrollHeight;
    }

    function showErr(msg) {
        errorToast.textContent = '⚠️ ' + msg;
        errorToast.classList.add('visible');
        setTimeout(() => errorToast.classList.remove('visible'), 4000);
    }

    function showTyping() {
        typingRow.classList.add('visible');
        chat.appendChild(typingRow);
        chat.scrollTop = chat.scrollHeight;
    }

    function hideTyping() { typingRow.classList.remove('visible'); }

    async function send() {
        const text = input.value.trim();
        if (!text) return;
        input.value = '';
        addMsg(text, 'user');
        showTyping();

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mensaje: text, sessionId: sessionId })
            });
            if (!res.ok) throw new Error(res.status);
            const data = await res.json();
            hideTyping();
            if (data.respuesta) {
                addMsg(data.respuesta, 'bot');
                if (data.modo === 'fallback') {
                    modeBadge.classList.add('visible');
                    setTimeout(() => modeBadge.classList.remove('visible'), 5000);
                }
            } else {
                throw new Error('empty');
            }
        } catch (e) {
            hideTyping();
            showErr('No pude conectar con Lupe. Revisa tu internet.');
        }
    }

    function sendQuick(text) {
        input.value = text;
        send();
    }

    input.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });

    // Mensaje inicial
    setTimeout(() => {
        addMsg('¡Hola! Soy <strong>Lupe</strong>, tu asistente virtual en la Municipalidad de El Colorado. 🏛️<br><br>Puedo ayudarte con:<br>• Trámites y requisitos<br>• Horarios de atención<br>• Cómo hacer reclamos<br>• Información sobre servicios<br><br>¿En qué puedo ayudarte hoy?', 'bot');
    }, 700);
</script>

</body>
</html>
